name: Windows build and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read application version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content Cargo.toml -Raw
          if ($manifest -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            throw "Could not read the application version from Cargo.toml"
          }
          "value=$($Matches[1])" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Run tests
        run: cargo test --workspace

      - name: Build release executable
        run: cargo build --release

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash target/release/TelemetryForge.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  TelemetryForge.exe" | Set-Content target/release/TelemetryForge.exe.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelemetryForge-windows-x64
          path: |
            target/release/TelemetryForge.exe
            target/release/TelemetryForge.exe.sha256

      - name: Create versioned main build
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ steps.version.outputs.value }}-build.${{ github.run_number }}"
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          gh release create $tag `
            target/release/TelemetryForge.exe `
            target/release/TelemetryForge.exe.sha256 `
            --target $env:GITHUB_SHA `
            --latest `
            --title "TelemetryForge $tag" `
            --notes "Latest automated Windows build from main commit $shortSha."

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $expected = "v${{ steps.version.outputs.value }}"
          if ("${{ github.ref_name }}" -ne $expected) {
            throw "Tag ${{ github.ref_name }} does not match Cargo.toml version $expected"
          }
          gh release create "${{ github.ref_name }}" target/release/TelemetryForge.exe target/release/TelemetryForge.exe.sha256 --generate-notes --title "TelemetryForge ${{ github.ref_name }}"
